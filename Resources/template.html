<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { color-scheme: light dark; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            font-size: 105%; line-height: 1.6; padding: 16px; margin: 0; 
        }
        a { text-decoration: none; }

        @media (prefers-color-scheme: light) {
            a { color: #007AFF; }
        }

        @media (prefers-color-scheme: dark) {
            a { color: #5E92F3; }
            body {
                color: #ffffff !important;
                background-color: #000000;
            }

            mjx-container,
            mjx-container * {
                color: inherit !important;
                border-color: inherit !important;
            }

            mjx-container svg path,
            mjx-container svg line,
            mjx-container svg polygon,
            mjx-container svg rect,
            mjx-container svg text {
                stroke: currentColor !important;
                fill: currentColor !important;
            }
        }

        mjx-container[display="true"] {
            overflow-x: auto; overflow-y: visible; max-width: 100%; padding: 15px 0; 
        }
        mjx-container[display="false"] { white-space: nowrap; }
    </style>

    <script>
        window.MathJax = {
            loader: {
                paths: {custom: './mathjax'},
                load: ['[custom]/xypic.js']
            },
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                packages: {'[+]': ['amscd', 'ams', 'newcommand', 'configmacros', 'xypic']}
            },
            chtml: {
                fontURL: './mathjax/fonts/woff-v2'
            }
        };
    </script>
    <script id="MathJax-script" async src="./mathjax/tex-chtml-full.js"></script>
</head>
<body>
    {{STACKS_CONTENT}}
</body>
</html>
